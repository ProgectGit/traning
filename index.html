<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренування - План</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>💪 Тренування</h1>
            <p class="subtitle">План тренувань з таймером та прогресом</p>
        </header>

        <section class="timer-section" aria-label="Таймер">
            <div class="timer-inputs">
                <label>
                    <input type="number" id="hours" min="0" max="23" value="0" inputmode="numeric">
                    Год
                </label>
                <label>
                    <input type="number" id="minutes" min="0" max="59" value="0" inputmode="numeric">
                    Хв
                </label>
                <label>
                    <input type="number" id="seconds" min="0" max="59" value="0" inputmode="numeric">
                    Сек
                </label>
            </div>
            <div class="timer-display" id="timerDisplay" aria-live="polite">00:00:00</div>
            <div class="timer-controls">
                <button class="btn-success" type="button" id="startTimer">▶ Старт</button>
                <button class="btn-warning" type="button" id="pauseTimer">⏸ Пауза</button>
                <button class="btn-danger" type="button" id="resetTimer">⏹ Скидання</button>
                <button class="btn-secondary" type="button" id="testSignal">🔔 Тест сигналу</button>
            </div>
        </section>

        <section class="stats" aria-label="Статистика">
            <div class="stats-number" id="completedCount">0/0</div>
            <div class="stats-label">вправ виконано</div>
            <div class="week-progress" aria-hidden="true">
                <div class="week-progress-bar" id="progressBar"></div>
            </div>
        </section>

        <section id="daysContainer" aria-label="Дні тренувань"></section>

        <div class="controls">
            <button class="btn-secondary" type="button" id="addDay">➕ Додати день</button>
            <button class="btn-danger" type="button" id="showResetModal">🔄 Обнулити відмітки</button>
            <button class="btn-warning" type="button" id="showClearModal">🗑 Очистити все</button>
        </div>
    </main>

    <div class="modal-overlay" id="resetModal" role="dialog" aria-modal="true" aria-labelledby="resetTitle">
        <div class="modal">
            <h3 id="resetTitle">🔄 Обнулити відмітки?</h3>
            <p>Всі галочки виконання буде знято, але вправи залишаться.</p>
            <div class="modal-buttons">
                <button class="btn-danger" type="button" id="resetChecks">Так, обнулити</button>
                <button class="btn-secondary" type="button" data-close-modal="resetModal">Скасувати</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="clearModal" role="dialog" aria-modal="true" aria-labelledby="clearTitle">
        <div class="modal">
            <h3 id="clearTitle">🗑 Очистити все?</h3>
            <p>Всі дні та вправи буде видалено назавжди.</p>
            <div class="modal-buttons">
                <button class="btn-danger" type="button" id="clearAll">Так, видалити</button>
                <button class="btn-secondary" type="button" data-close-modal="clearModal">Скасувати</button>
            </div>
        </div>
    </div>

    <div class="alarm-overlay" id="timerAlarm" role="dialog" aria-modal="true" aria-labelledby="alarmTitle">
        <div class="alarm-panel">
            <h2 id="alarmTitle">Час вийшов</h2>
            <p>Таймер завершився.</p>
            <button class="btn-primary" type="button" id="dismissAlarm">Закрити</button>
        </div>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
