<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренування - План</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #151823;
            --panel: #202838;
            --panel-strong: #26344d;
            --accent: #ef4f64;
            --accent-strong: #d93c52;
            --success: #2f9e66;
            --warning: #e99b28;
            --danger: #c9453d;
            --text: #f5f7fb;
            --muted: #a9b1c3;
            --line: #34425b;
        }

        body {
            min-height: 100vh;
            padding: 20px;
            background:
                radial-gradient(circle at top left, rgba(239, 79, 100, 0.18), transparent 32rem),
                linear-gradient(160deg, #151823 0%, #10131d 100%);
            color: var(--text);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            width: min(720px, 100%);
            margin: 0 auto;
        }

        header {
            margin-bottom: 24px;
            text-align: center;
        }

        h1 {
            margin-bottom: 8px;
            color: var(--text);
            font-size: clamp(1.7rem, 4vw, 2.35rem);
            letter-spacing: 0;
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .timer-section,
        .stats,
        .day-card,
        .modal {
            border: 1px solid var(--line);
            background: rgba(32, 40, 56, 0.94);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.18);
        }

        .timer-section {
            margin-bottom: 20px;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .timer-inputs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 14px;
        }

        .timer-inputs label {
            display: grid;
            gap: 5px;
            color: var(--muted);
            font-size: 0.76rem;
        }

        input {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #141925;
            color: var(--text);
            font: inherit;
        }

        .timer-inputs input {
            width: 72px;
            padding: 9px 8px;
            text-align: center;
            font-size: 1rem;
        }

        .timer-display {
            margin: 12px 0 16px;
            color: var(--accent);
            font-family: "Courier New", monospace;
            font-size: clamp(2.25rem, 9vw, 3.5rem);
            font-weight: 800;
        }

        .timer-controls,
        .controls,
        .modal-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        button {
            min-height: 44px;
            border: 0;
            border-radius: 8px;
            padding: 11px 18px;
            color: #fff;
            cursor: pointer;
            font: inherit;
            font-weight: 700;
            transition: transform 0.16s ease, filter 0.16s ease, opacity 0.16s ease;
        }

        button:hover {
            filter: brightness(1.06);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button:focus-visible,
        input:focus-visible,
        .day-header:focus-visible,
        .checkbox:focus-visible {
            outline: 3px solid rgba(239, 79, 100, 0.45);
            outline-offset: 2px;
        }

        .btn-primary { background: var(--accent); }
        .btn-secondary { background: var(--panel-strong); }
        .btn-danger { background: var(--danger); }
        .btn-success { background: var(--success); }
        .btn-warning { background: var(--warning); color: #22170a; }

        .stats {
            margin-bottom: 20px;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
        }

        .stats-number {
            color: var(--accent);
            font-size: 2rem;
            font-weight: 800;
        }

        .stats-label {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .week-progress {
            height: 8px;
            margin-top: 16px;
            overflow: hidden;
            border-radius: 999px;
            background: #111724;
        }

        .week-progress-bar {
            width: 0;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--accent), #ffb14f);
            transition: width 0.35s ease;
        }

        .day-card {
            margin-bottom: 14px;
            overflow: hidden;
            border-radius: 8px;
        }

        .day-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            width: 100%;
            padding: 15px 18px;
            border: 0;
            border-radius: 0;
            background: var(--panel-strong);
            color: var(--text);
            text-align: left;
        }

        .day-header.complete {
            background: var(--accent-strong);
        }

        .day-title {
            overflow-wrap: anywhere;
            font-size: 1.05rem;
            font-weight: 800;
        }

        .day-progress {
            flex: 0 0 auto;
            color: #d7deeb;
            font-size: 0.88rem;
        }

        .exercises {
            display: none;
            padding: 14px 18px 18px;
        }

        .exercises.open {
            display: block;
        }

        .exercise-item {
            display: grid;
            grid-template-columns: 28px minmax(0, 1fr) auto;
            gap: 12px;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--line);
        }

        .exercise-item:last-of-type {
            border-bottom: 0;
        }

        .checkbox {
            display: grid;
            width: 26px;
            height: 26px;
            place-items: center;
            border: 2px solid var(--accent);
            border-radius: 6px;
            background: transparent;
            color: #fff;
            cursor: pointer;
        }

        .checkbox.checked {
            background: var(--accent);
        }

        .checkbox.checked::after {
            content: "✓";
            font-weight: 800;
        }

        .exercise-name {
            min-width: 0;
            overflow-wrap: anywhere;
        }

        .exercise-item.done .exercise-name {
            color: #798397;
            text-decoration: line-through;
        }

        .sets-reps {
            color: var(--muted);
            font-size: 0.88rem;
            white-space: nowrap;
        }

        .empty-day {
            padding: 12px 0;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .add-form {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(96px, 140px) 46px;
            gap: 8px;
            margin-top: 14px;
        }

        .add-form input {
            min-width: 0;
            padding: 10px;
        }

        .add-form button {
            min-width: 46px;
            padding: 0;
        }

        .controls {
            margin-top: 24px;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 18px;
            background: rgba(7, 10, 16, 0.76);
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            width: min(420px, 100%);
            padding: 26px;
            border-radius: 8px;
            text-align: center;
        }

        .modal h3 {
            margin-bottom: 12px;
            color: var(--accent);
            font-size: 1.25rem;
        }

        .modal p {
            margin-bottom: 20px;
            color: var(--muted);
            line-height: 1.45;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.55; }
        }

        .timer-running {
            animation: pulse 1s infinite;
        }

        @media (max-width: 560px) {
            body {
                padding: 14px;
            }

            .timer-section,
            .stats {
                padding: 16px;
            }

            .day-header {
                align-items: flex-start;
                flex-direction: column;
                gap: 5px;
            }

            .exercise-item {
                grid-template-columns: 28px minmax(0, 1fr);
            }

            .sets-reps {
                grid-column: 2;
                white-space: normal;
            }

            .add-form {
                grid-template-columns: 1fr;
            }

            .add-form button {
                width: 100%;
                min-width: 0;
            }

            .controls button,
            .timer-controls button,
            .modal-buttons button {
                flex: 1 1 150px;
            }
        }
    </style>
</head>
<body>
    <main class="container">
        <header>
            <h1>💪 Тренування</h1>
            <p class="subtitle">План тренувань з таймером та прогресом</p>
        </header>

        <section class="timer-section" aria-label="Таймер">
            <div class="timer-inputs">
                <label>
                    <input type="number" id="hours" min="0" max="23" value="0" inputmode="numeric">
                    Год
                </label>
                <label>
                    <input type="number" id="minutes" min="0" max="59" value="0" inputmode="numeric">
                    Хв
                </label>
                <label>
                    <input type="number" id="seconds" min="0" max="59" value="0" inputmode="numeric">
                    Сек
                </label>
            </div>
            <div class="timer-display" id="timerDisplay" aria-live="polite">00:00:00</div>
            <div class="timer-controls">
                <button class="btn-success" type="button" id="startTimer">▶ Старт</button>
                <button class="btn-warning" type="button" id="pauseTimer">⏸ Пауза</button>
                <button class="btn-danger" type="button" id="resetTimer">⏹ Скидання</button>
            </div>
        </section>

        <section class="stats" aria-label="Статистика">
            <div class="stats-number" id="completedCount">0/0</div>
            <div class="stats-label">вправ виконано</div>
            <div class="week-progress" aria-hidden="true">
                <div class="week-progress-bar" id="progressBar"></div>
            </div>
        </section>

        <section id="daysContainer" aria-label="Дні тренувань"></section>

        <div class="controls">
            <button class="btn-secondary" type="button" id="addDay">➕ Додати день</button>
            <button class="btn-danger" type="button" id="showResetModal">🔄 Обнулити відмітки</button>
            <button class="btn-warning" type="button" id="showClearModal">🗑 Очистити все</button>
        </div>
    </main>

    <div class="modal-overlay" id="resetModal" role="dialog" aria-modal="true" aria-labelledby="resetTitle">
        <div class="modal">
            <h3 id="resetTitle">🔄 Обнулити відмітки?</h3>
            <p>Всі галочки виконання буде знято, але вправи залишаться.</p>
            <div class="modal-buttons">
                <button class="btn-danger" type="button" id="resetChecks">Так, обнулити</button>
                <button class="btn-secondary" type="button" data-close-modal="resetModal">Скасувати</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="clearModal" role="dialog" aria-modal="true" aria-labelledby="clearTitle">
        <div class="modal">
            <h3 id="clearTitle">🗑 Очистити все?</h3>
            <p>Всі дні та вправи буде видалено назавжди.</p>
            <div class="modal-buttons">
                <button class="btn-danger" type="button" id="clearAll">Так, видалити</button>
                <button class="btn-secondary" type="button" data-close-modal="clearModal">Скасувати</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = "workout_plan_v1";

        const defaultData = {
            days: [
                {
                    id: 1,
                    name: "День 1 - Груди + Трицепс",
                    open: true,
                    exercises: [
                        { id: 101, name: "Жим штанги лежачи", sets: "4x8-10", done: false },
                        { id: 102, name: "Жим гантелей на нахилі", sets: "3x10-12", done: false },
                        { id: 103, name: "Розведення гантелей", sets: "3x12-15", done: false },
                        { id: 104, name: "Французький жим", sets: "3x10-12", done: false },
                        { id: 105, name: "Віджимання на брусах", sets: "3x8-12", done: false }
                    ]
                },
                {
                    id: 2,
                    name: "День 2 - Спина + Біцепс",
                    open: false,
                    exercises: [
                        { id: 201, name: "Тяга штанги в нахилі", sets: "4x8-10", done: false },
                        { id: 202, name: "Підтягування", sets: "4xмакс", done: false },
                        { id: 203, name: "Тяга верхнього блоку", sets: "3x12-15", done: false },
                        { id: 204, name: "Згинання рук зі штангою", sets: "3x10-12", done: false },
                        { id: 205, name: "Молотки", sets: "3x12-15", done: false }
                    ]
                },
                {
                    id: 3,
                    name: "День 3 - Ноги + Плечі",
                    open: false,
                    exercises: [
                        { id: 301, name: "Присідання зі штангою", sets: "4x8-10", done: false },
                        { id: 302, name: "Випади з гантелями", sets: "3x10-12", done: false },
                        { id: 303, name: "Жим ногами", sets: "3x12-15", done: false },
                        { id: 304, name: "Жим штанги стоячи", sets: "4x8-10", done: false },
                        { id: 305, name: "Махи гантелями", sets: "3x12-15", done: false }
                    ]
                }
            ]
        };

        let data = cloneData(defaultData);
        let timerInterval = null;
        let timeLeft = 0;
        let isRunning = false;

        const daysContainer = document.getElementById("daysContainer");
        const timerDisplay = document.getElementById("timerDisplay");
        const completedCount = document.getElementById("completedCount");
        const progressBar = document.getElementById("progressBar");

        function cloneData(value) {
            return JSON.parse(JSON.stringify(value));
        }

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);

            if (!saved) {
                render();
                return;
            }

            try {
                const parsed = JSON.parse(saved);
                if (parsed && Array.isArray(parsed.days)) {
                    data = parsed;
                }
            } catch (error) {
                localStorage.removeItem(STORAGE_KEY);
                data = cloneData(defaultData);
            }

            render();
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            updateStats();
        }

        function render() {
            daysContainer.replaceChildren();

            if (data.days.length === 0) {
                const empty = document.createElement("p");
                empty.className = "empty-day";
                empty.textContent = "План порожній. Додайте день тренування.";
                daysContainer.append(empty);
                updateStats();
                return;
            }

            data.days.forEach((day, dayIndex) => {
                const doneCount = day.exercises.filter((exercise) => exercise.done).length;
                const totalCount = day.exercises.length;
                const isComplete = doneCount === totalCount && totalCount > 0;

                const dayEl = document.createElement("article");
                dayEl.className = "day-card";

                const header = document.createElement("button");
                header.type = "button";
                header.className = `day-header${isComplete ? " complete" : ""}`;
                header.setAttribute("aria-expanded", String(Boolean(day.open)));
                header.addEventListener("click", () => toggleDay(dayIndex));

                const title = document.createElement("span");
                title.className = "day-title";
                title.textContent = day.name;

                const progress = document.createElement("span");
                progress.className = "day-progress";
                progress.textContent = `${doneCount}/${totalCount} ✓`;

                header.append(title, progress);

                const exercises = document.createElement("div");
                exercises.className = `exercises${day.open ? " open" : ""}`;

                if (day.exercises.length === 0) {
                    const emptyDay = document.createElement("p");
                    emptyDay.className = "empty-day";
                    emptyDay.textContent = "У цьому дні ще немає вправ.";
                    exercises.append(emptyDay);
                }

                day.exercises.forEach((exercise, exerciseIndex) => {
                    exercises.append(createExerciseItem(exercise, dayIndex, exerciseIndex));
                });

                exercises.append(createAddExerciseForm(dayIndex));
                dayEl.append(header, exercises);
                daysContainer.append(dayEl);
            });

            updateStats();
        }

        function createExerciseItem(exercise, dayIndex, exerciseIndex) {
            const item = document.createElement("div");
            item.className = `exercise-item${exercise.done ? " done" : ""}`;

            const checkbox = document.createElement("button");
            checkbox.type = "button";
            checkbox.className = `checkbox${exercise.done ? " checked" : ""}`;
            checkbox.setAttribute("aria-label", `${exercise.done ? "Зняти відмітку" : "Позначити виконаною"}: ${exercise.name}`);
            checkbox.addEventListener("click", () => toggleExercise(dayIndex, exerciseIndex));

            const name = document.createElement("span");
            name.className = "exercise-name";
            name.textContent = exercise.name;

            const sets = document.createElement("span");
            sets.className = "sets-reps";
            sets.textContent = exercise.sets;

            item.append(checkbox, name, sets);
            return item;
        }

        function createAddExerciseForm(dayIndex) {
            const form = document.createElement("form");
            form.className = "add-form";
            form.addEventListener("submit", (event) => {
                event.preventDefault();
                addExercise(dayIndex, form);
            });

            const nameInput = document.createElement("input");
            nameInput.type = "text";
            nameInput.placeholder = "Нова вправа...";
            nameInput.autocomplete = "off";
            nameInput.maxLength = 80;

            const setsInput = document.createElement("input");
            setsInput.type = "text";
            setsInput.placeholder = "Підходи";
            setsInput.autocomplete = "off";
            setsInput.maxLength = 24;

            const button = document.createElement("button");
            button.className = "btn-primary";
            button.type = "submit";
            button.textContent = "➕";
            button.setAttribute("aria-label", "Додати вправу");

            form.append(nameInput, setsInput, button);
            return form;
        }

        function toggleDay(dayIndex) {
            data.days[dayIndex].open = !data.days[dayIndex].open;
            saveData();
            render();
        }

        function toggleExercise(dayIndex, exerciseIndex) {
            data.days[dayIndex].exercises[exerciseIndex].done = !data.days[dayIndex].exercises[exerciseIndex].done;
            saveData();
            render();
        }

        function addExercise(dayIndex, form) {
            const [nameInput, setsInput] = form.querySelectorAll("input");
            const name = nameInput.value.trim();
            const sets = setsInput.value.trim() || "3x10";

            if (!name) {
                nameInput.focus();
                return;
            }

            data.days[dayIndex].exercises.push({
                id: Date.now(),
                name,
                sets,
                done: false
            });

            data.days[dayIndex].open = true;
            saveData();
            render();
        }

        function addDay() {
            const name = prompt("Назва дня (наприклад: День 4 - Кардіо):");
            const trimmedName = name ? name.trim() : "";

            if (!trimmedName) return;

            const newId = data.days.length > 0 ? Math.max(...data.days.map((day) => day.id)) + 1 : 1;

            data.days.push({
                id: newId,
                name: trimmedName,
                exercises: [],
                open: true
            });

            saveData();
            render();
        }

        function showModal(id) {
            document.getElementById(id).classList.add("show");
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove("show");
        }

        function resetChecks() {
            data.days.forEach((day) => {
                day.exercises.forEach((exercise) => {
                    exercise.done = false;
                });
            });
            saveData();
            render();
            closeModal("resetModal");
        }

        function clearAll() {
            data = { days: [] };
            saveData();
            render();
            closeModal("clearModal");
        }

        function updateStats() {
            const exercises = data.days.flatMap((day) => day.exercises);
            const total = exercises.length;
            const done = exercises.filter((exercise) => exercise.done).length;
            const percent = total > 0 ? (done / total) * 100 : 0;

            completedCount.textContent = `${done}/${total}`;
            progressBar.style.width = `${percent}%`;
        }

        function getTimerInputSeconds() {
            const hours = clampNumber(document.getElementById("hours").value, 0, 23);
            const minutes = clampNumber(document.getElementById("minutes").value, 0, 59);
            const seconds = clampNumber(document.getElementById("seconds").value, 0, 59);

            document.getElementById("hours").value = hours;
            document.getElementById("minutes").value = minutes;
            document.getElementById("seconds").value = seconds;

            return hours * 3600 + minutes * 60 + seconds;
        }

        function clampNumber(value, min, max) {
            const number = Number.parseInt(value, 10);
            if (Number.isNaN(number)) return min;
            return Math.min(Math.max(number, min), max);
        }

        function updateTimerDisplay() {
            const hours = Math.floor(timeLeft / 3600);
            const minutes = Math.floor((timeLeft % 3600) / 60);
            const seconds = timeLeft % 60;

            timerDisplay.textContent = [
                hours,
                minutes,
                seconds
            ].map((unit) => String(unit).padStart(2, "0")).join(":");
        }

        function startTimer() {
            if (isRunning) return;

            if (timeLeft === 0) {
                timeLeft = getTimerInputSeconds();
            }

            if (timeLeft <= 0) {
                alert("Встановіть час!");
                return;
            }

            isRunning = true;
            timerDisplay.classList.add("timer-running");

            timerInterval = window.setInterval(() => {
                timeLeft -= 1;
                updateTimerDisplay();

                if (timeLeft <= 0) {
                    pauseTimer();
                    playTimerSound();
                    alert("⏰ Час вийшов!");
                }
            }, 1000);
        }

        function pauseTimer() {
            window.clearInterval(timerInterval);
            timerInterval = null;
            isRunning = false;
            timerDisplay.classList.remove("timer-running");
        }

        function resetTimer() {
            pauseTimer();
            timeLeft = 0;
            updateTimerDisplay();
        }

        function playTimerSound() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const audioContext = new AudioContext();
                const oscillator = audioContext.createOscillator();
                const gain = audioContext.createGain();

                oscillator.type = "sine";
                oscillator.frequency.value = 880;
                gain.gain.setValueAtTime(0.0001, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.22, audioContext.currentTime + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 0.35);
                oscillator.connect(gain);
                gain.connect(audioContext.destination);
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.36);
            } catch (error) {
                // Sound is optional; some browsers block audio until user interaction.
            }
        }

        document.getElementById("startTimer").addEventListener("click", startTimer);
        document.getElementById("pauseTimer").addEventListener("click", pauseTimer);
        document.getElementById("resetTimer").addEventListener("click", resetTimer);
        document.getElementById("addDay").addEventListener("click", addDay);
        document.getElementById("showResetModal").addEventListener("click", () => showModal("resetModal"));
        document.getElementById("showClearModal").addEventListener("click", () => showModal("clearModal"));
        document.getElementById("resetChecks").addEventListener("click", resetChecks);
        document.getElementById("clearAll").addEventListener("click", clearAll);

        document.querySelectorAll("[data-close-modal]").forEach((button) => {
            button.addEventListener("click", () => closeModal(button.dataset.closeModal));
        });

        document.querySelectorAll(".modal-overlay").forEach((modal) => {
            modal.addEventListener("click", (event) => {
                if (event.target === modal) closeModal(modal.id);
            });
        });

        document.addEventListener("keydown", (event) => {
            if (event.key === "Escape") {
                closeModal("resetModal");
                closeModal("clearModal");
            }
        });

        loadData();
        updateTimerDisplay();
    </script>
</body>
</html>
